<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Undergrove — a tree of your days</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #030604;
    --bg-panel: rgba(11, 18, 13, 0.85);
    --bg-input: rgba(13, 23, 18, 0.6);
    --line: #1c2e20;
    --line-glow: #2f5c3d;
    --moss: #4ade80;
    --moss-soft: #7cf0a3;
    --moss-dim: #245234;
    --amber: #e0a94a;
    --amber-dim: #7a5a26;
    --bark: #1a1511;
    --bark-light: #241c16;
    --text-main: #e2ede4;
    --text-dim: #9ab3a4;
    --text-faint: #4a5f52;
    --danger: #c96a5a;
    --leaf-fresh: #6fe9a0;
    --leaf-fresh-glow: #a8ffce;
    --leaf-wilt: #5c4a30;
    --leaf-wilt-glow: #8a6f45;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  button { touch-action: manipulation; }

  html, body {
    height: 100%; margin: 0; background: var(--bg-deep);
    color: var(--text-main); font-family: 'EB Garamond', serif;
    overflow: hidden; /* Lock native scroll completely */
    overscroll-behavior: none;
  }

  :focus-visible { outline: 2px solid var(--moss-soft); outline-offset: 2px; border-radius: 6px; }

  /* ---------- atmosphere ---------- */
  .canopy {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 70% 40% at 15% 0%, rgba(74,222,128,0.07), transparent 60%),
      radial-gradient(ellipse 60% 30% at 85% 5%, rgba(74,222,128,0.04), transparent 60%),
      radial-gradient(ellipse 100% 40% at 50% 100%, rgba(20,40,26,0.6), transparent 70%);
  }

  .firefly {
    position: fixed; z-index: 0; border-radius: 50%; pointer-events: none;
    background: var(--moss-soft); box-shadow: 0 0 8px 2px rgba(124,240,163,0.6), 0 0 20px 6px rgba(74,222,128,0.15);
    opacity: 0; animation: drift linear infinite, glow 3.4s ease-in-out infinite;
  }
  @keyframes drift { 0% { transform: translate(0,0); } 100% { transform: translate(var(--dx), var(--dy)); } }
  @keyframes glow { 0%, 100% { opacity: 0; } 15%, 85% { opacity: .7; } 50% { opacity: .2; } }

  /* ---------- topbar ---------- */
  .topbar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; align-items: center; gap: 16px; padding: 14px 20px;
    background: linear-gradient(180deg, rgba(3,6,4,0.95) 0%, rgba(3,6,4,0.7) 100%);
    border-bottom: 1px solid rgba(28, 46, 32, 0.5);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }

  .brand { display: flex; align-items: baseline; gap: 10px; flex-shrink: 0; }
  .brand .glyph { font-size: 18px; color: var(--moss); text-shadow: 0 0 12px rgba(74,222,128,0.5); }
  .brand h1 {
    font-family: 'Cinzel', serif; font-weight: 600; font-size: 16px; letter-spacing: 2px;
    margin: 0; color: var(--moss-soft); text-shadow: 0 0 12px rgba(74,222,128,0.2);
  }
  .brand .leaf-count {
    font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: .5px;
    color: var(--text-faint); border: 1px solid var(--line); border-radius: 10px;
    padding: 2px 8px; white-space: nowrap; transition: color .3s, border-color .3s;
  }

  .search-wrap { position: relative; flex: 1; min-width: 0; }
  .search-wrap input {
    width: 100%; height: 42px; background: var(--bg-input); border: 1px solid var(--line);
    color: var(--text-main); font-family: 'EB Garamond', serif; font-size: 16px;
    padding: 0 76px 0 36px; border-radius: 24px; outline: none; transition: all .3s;
  }
  .search-wrap input:focus { border-color: var(--moss-dim); background: rgba(20, 36, 26, 0.7); box-shadow: 0 0 0 3px rgba(74,222,128,0.1); }
  .search-wrap::before { content: "⌕"; position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-faint); font-size: 16px; }
  .search-badge {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .3px;
    color: var(--text-faint); pointer-events: none; white-space: nowrap; transition: color .2s;
  }
  .search-badge.match { color: var(--moss-soft); text-shadow: 0 0 6px rgba(74,222,128,0.4); }
  .search-badge.none { color: var(--danger); }

  .wind-btn {
    flex-shrink: 0; width: 42px; height: 42px; border-radius: 50%; position: relative;
    background: var(--bg-input); border: 1px solid var(--line); color: var(--text-dim);
    font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s;
  }
  .wind-btn:hover { border-color: var(--moss-dim); color: var(--moss-soft); box-shadow: 0 0 14px rgba(74,222,128,0.15); transform: rotate(5deg); }
  .wind-btn:disabled { opacity: .35; cursor: default; transform: none !important; box-shadow: none !important; }
  .ug-badge {
    position: absolute; top: -4px; right: -4px; min-width: 16px; height: 16px; padding: 0 4px;
    border-radius: 999px; background: var(--amber); color: #1a1207; font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 600; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 6px rgba(224,169,74,0.6); line-height: 1;
  }
  .ug-badge:empty { display: none; }

  /* ---------- filter bar ---------- */
  .filterbar {
    position: absolute; top: 71px; left: 0; right: 0; z-index: 9;
    display: flex; gap: 8px; align-items: center; padding: 8px 20px;
    overflow-x: auto; scrollbar-width: none;
    background: linear-gradient(180deg, rgba(3,6,4,0.85) 0%, rgba(3,6,4,0.4) 100%);
    border-bottom: 1px solid rgba(28, 46, 32, 0.35);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  }
  .filterbar::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .5px;
    color: var(--text-dim); background: var(--bg-input); border: 1px solid var(--line); border-radius: 999px;
    padding: 8px 14px; cursor: pointer; transition: all .2s; white-space: nowrap;
  }
  .chip:hover { border-color: var(--moss-dim); color: var(--moss-soft); }
  .chip.active { background: rgba(74,222,128,0.15); border-color: var(--moss); color: var(--moss-soft); box-shadow: 0 0 10px rgba(74,222,128,0.15); }
  .chip-accent { margin-left: auto; border-color: var(--amber-dim); color: var(--amber); }
  .chip-accent:hover { border-color: var(--amber); color: var(--amber); box-shadow: 0 0 10px rgba(224,169,74,0.2); }

  /* ---------- zoom controls ---------- */
  .zoom-controls { position: fixed; left: 20px; bottom: 32px; z-index: 12; display: flex; flex-direction: column; gap: 8px; }
  .zc-btn {
    width: 40px; height: 40px; border-radius: 50%; background: var(--bg-input); border: 1px solid var(--line);
    color: var(--text-dim); font-size: 18px; font-family: 'JetBrains Mono', monospace; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all .2s;
  }
  .zc-btn:hover { border-color: var(--moss-dim); color: var(--moss-soft); box-shadow: 0 0 12px rgba(74,222,128,0.15); }
  .zc-btn:active { transform: scale(.92); }
  .zc-center { font-size: 15px; }

  /* ---------- canvas (Pan/Zoom Engine) ---------- */
  .canvas-wrap {
    position: absolute; inset: 0; top: 113px; /* Account for topbar + filterbar */
    z-index: 1; overflow: hidden; contain: layout paint;
    cursor: grab; touch-action: none; /* Disables all native touch-scrolling */
  }
  .canvas-wrap:active { cursor: grabbing; }

  #zoomContainer {
    position: absolute; top: 0; left: 0;
    transform-origin: 0 0; will-change: transform;
    /* We add a transition here ONLY when we want to smoothly animate camera movement */
    transition: transform 0s linear;
  }
  #zoomContainer.smooth-cam { transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); }

  .tree-glow {
    position: absolute; z-index: 0; top: 10%; left: 50%; transform: translateX(-50%);
    width: 1500px; height: 800px;
    background: radial-gradient(ellipse 50% 50% at 50% 50%, rgba(124,240,163,0.12), transparent 70%);
    filter: blur(20px); pointer-events: none;
  }

  #treeSvg { position: relative; z-index: 1; display: block; transition: filter .35s ease; }
  #treeSvg.tree-blurred { filter: blur(4.5px) brightness(0.7) saturate(0.85); }

  /* The Focus Lens: a crisp clone of the in-focus leaf floats above the blurred backdrop,
     sharing the same transform (it's a sibling inside zoomContainer), so it tracks perfectly. */
  #treeSvgFocus {
    position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none;
    opacity: 0; transition: opacity .3s ease;
  }
  #treeSvgFocus.show { opacity: 1; }

  .trunk { fill: var(--bark); }
  .branch { fill: none; stroke: var(--bark-light); stroke-linecap: round; }
  .twig { fill: none; stroke: var(--bark-light); stroke-linecap: round; opacity: .9; }

  .leaf-group { cursor: pointer; animation: sway ease-in-out infinite; transform-box: fill-box; transform-origin: bottom center; transition: opacity .3s ease; }
  .leaf-group.still { animation: none; }
  .leaf-group .hit { fill: transparent; cursor: pointer; }
  .leaf-body { fill: var(--leaf-fill, var(--moss-dim)); stroke: var(--leaf-stroke, var(--moss)); stroke-width: 1; transition: fill .3s, stroke .3s, filter .2s; }
  .leaf-vein { stroke: rgba(3,8,5,0.6); stroke-width: 1; }
  .leaf-bud .leaf-body { stroke-width: 1.3; }

  .leaf-group:hover .leaf-body, .leaf-group:focus-visible .leaf-body { fill: var(--moss); stroke: var(--moss-soft); filter: drop-shadow(0 0 12px rgba(124,240,163,0.9)); }
  .leaf-group.done .leaf-body { fill: var(--amber-dim); stroke: var(--amber); filter: drop-shadow(0 2px 4px rgba(224,169,74,0.3)); }
  .leaf-group.done:hover .leaf-body, .leaf-group.done:focus-visible .leaf-body { fill: var(--amber); filter: drop-shadow(0 0 12px rgba(224,169,74,0.8)); }
  .leaf-group.leaf-fresh .leaf-body { filter: drop-shadow(0 0 13px rgba(160,255,200,0.75)); }

  /* ---------- search: dim non-matches, glow matches, camera does the rest ---------- */
  .leaf-group.search-dim { opacity: .2; }
  .leaf-group.search-dim .leaf-body { filter: none; }
  .leaf-group.search-match .leaf-body { filter: drop-shadow(0 0 14px rgba(124,240,163,0.85)); stroke: var(--moss-soft); }
  .leaf-group.search-match .leaf-label { fill: var(--moss-soft); }

  /* ---------- dynamic links: a neural web between leaves that share a tag or keyword,
     each connecting term gets its own color so the web reads at a glance ---------- */
  .tag-link {
    fill: none; stroke: var(--link-color, rgba(124,240,163,0.5)); stroke-linecap: round;
    opacity: .5; pointer-events: none; animation: flowDash 3.2s linear infinite;
    filter: drop-shadow(0 0 2px var(--link-color, rgba(74,222,128,0.2)));
    transition: stroke-width .25s, opacity .25s, filter .25s;
  }
  .tag-link.link-tag { stroke-width: 1.7; stroke-dasharray: 2 6; opacity: .62; }
  .tag-link.link-keyword { stroke-width: 1.1; stroke-dasharray: 1 5; opacity: .38; }
  .tag-link.active { stroke-width: 2.4; opacity: 1; filter: drop-shadow(0 0 8px var(--link-color, rgba(124,240,163,0.6))); }
  @keyframes flowDash { to { stroke-dashoffset: -40; } }

  @keyframes sway { 0%, 100% { transform: rotate(-2.5deg); } 50% { transform: rotate(2.5deg); } }
  .leaf-group.new-leaf { animation: sprout 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, sway ease-in-out infinite; }
  @keyframes sprout { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

  .mini-leaf { fill: var(--moss-dim); opacity: .6; stroke: var(--moss-dim); stroke-width: .5; }
  .twig-deep { opacity: .55; }
  .mini-leaf-deep { opacity: .38; }

  /* ---------- animations ---------- */
  .wood-group { transition: transform 1.2s cubic-bezier(.55,.05,.7,.35), opacity 1.2s ease .3s; transform-box: view-box; }
  .wood-group.topple { transform: rotate(78deg) translateY(12px); opacity: .1; }
  .crack-line { stroke: var(--text-main); stroke-width: 1.5; opacity: 0; fill: none; }
  .crack-line.flash { animation: crackFlash .5s ease-out forwards; }
  @keyframes crackFlash { 0% { opacity: 0; } 30% { opacity: 1; } 100% { opacity: 0; } }
  @keyframes gustAway { 0% { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; } 100% { transform: translate(var(--gx), var(--gy)) rotate(var(--gr)) scale(0.5); opacity: 0; } }
  .regrow { animation: regrowFade .8s ease .2s both; }
  @keyframes regrowFade { 0% { opacity: 0; transform: scale(.9); } 100% { opacity: 1; transform: scale(1); } }

  .leaf-label { font-family: 'JetBrains Mono', monospace; font-size: 13px; fill: var(--text-dim); text-anchor: middle; pointer-events: none; letter-spacing: .5px; font-weight: 500; }
  .leaf-label.done { fill: var(--amber); opacity: .85; }
  .empty-note { fill: var(--text-faint); font-family: 'EB Garamond', serif; font-style: italic; font-size: 18px; text-anchor: middle; letter-spacing: 1px; }

  /* ---------- FAB ---------- */
  .fab {
    position: fixed; right: 24px; bottom: 32px; z-index: 12;
    width: 64px; height: 64px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #206940, #0f2a19 70%);
    border: 1px solid var(--moss-dim); color: var(--moss-soft);
    font-size: 28px; font-family: 'EB Garamond', serif; display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 8px 24px rgba(0,0,0,0.6), 0 0 20px rgba(74,222,128,0.25);
    transition: transform .2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow .2s; animation: pulseFab 3s infinite alternate;
  }
  .fab:hover { transform: scale(1.1); animation: none; box-shadow: 0 12px 28px rgba(0,0,0,0.7), 0 0 30px rgba(74,222,128,0.4); }
  .fab:active { transform: scale(.95); }
  .fab:disabled { opacity: .4; cursor: default; animation: none; transform: none; }
  @keyframes pulseFab { 0% { box-shadow: 0 8px 24px rgba(0,0,0,0.6), 0 0 15px rgba(74,222,128,0.2); } 100% { box-shadow: 0 8px 24px rgba(0,0,0,0.6), 0 0 30px rgba(74,222,128,0.4); } }

  /* ---------- quick capture FAB ---------- */
  .quick-fab {
    position: fixed; right: 24px; bottom: 106px; z-index: 12;
    width: 46px; height: 46px; border-radius: 50%;
    background: var(--bg-input); border: 1px solid var(--line); color: var(--amber);
    font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,0.5); transition: all .2s;
  }
  .quick-fab:hover { border-color: var(--amber-dim); box-shadow: 0 4px 18px rgba(224,169,74,0.25); transform: scale(1.06); }
  .quick-fab:active { transform: scale(.94); }

  /* ---------- Focus Mode: a minimalist quick-capture overlay, tree hidden, one field ---------- */
  .focus-overlay {
    position: fixed; inset: 0; z-index: 40;
    background: radial-gradient(ellipse at 50% 38%, rgba(12,22,15,0.98), rgba(2,4,3,0.995));
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity .35s ease;
  }
  .focus-overlay.show { opacity: 1; pointer-events: auto; }
  .focus-close { position: absolute; top: 20px; right: 20px; }
  .focus-inner { width: 100%; max-width: 440px; padding: 0 28px; text-align: center; }
  .focus-glyph { font-size: 34px; margin-bottom: 6px; animation: loadSway 3s ease-in-out infinite; filter: drop-shadow(0 0 14px rgba(74,222,128,0.4)); }
  .focus-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-faint); margin-bottom: 22px; }
  .focus-input {
    width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--line);
    color: var(--text-main); font-family: 'EB Garamond', serif; font-size: 26px; text-align: center;
    padding: 10px 4px; outline: none; transition: border-color .2s;
  }
  .focus-input:focus { border-color: var(--moss-dim); }
  .focus-input::placeholder { color: rgba(139,163,148,0.4); }
  .focus-tags-input {
    width: 100%; background: transparent; border: none; color: var(--text-dim); font-family: 'JetBrains Mono', monospace;
    font-size: 12px; text-align: center; padding: 14px 4px 4px; outline: none; letter-spacing: .3px;
  }
  .focus-tags-input::placeholder { color: var(--text-faint); }
  .focus-hint { margin-top: 18px; font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--text-faint); letter-spacing: .5px; }
  .focus-session { margin-top: 26px; display: flex; flex-direction: column; gap: 6px; max-height: 160px; overflow-y: auto; }
  .focus-session-item {
    font-family: 'EB Garamond', serif; font-size: 14px; color: var(--moss-soft); opacity: .85;
    display: flex; align-items: center; gap: 8px; justify-content: center; animation: regrowFade .3s ease both;
  }
  @media (max-width: 480px) {
    .quick-fab { bottom: 90px; right: 20px; width: 42px; height: 42px; font-size: 16px; }
    .focus-input { font-size: 21px; }
  }

  /* ---------- modal ---------- */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 20; background: rgba(2, 4, 3, 0.75); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .3s ease;
  }
  .modal-overlay.show { opacity: 1; pointer-events: auto; }

  .modal-card {
    width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; background: var(--bg-panel);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(47, 92, 61, 0.4); border-bottom: none; border-radius: 28px 28px 0 0; padding: 24px 28px 32px;
    box-shadow: 0 -10px 40px rgba(0,0,0,0.8), 0 0 40px rgba(74,222,128,0.05); transform: translateY(100%); transition: transform .4s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .modal-overlay.show .modal-card { transform: translateY(0); }
  .drag-handle { width: 44px; height: 5px; background: rgba(139, 163, 148, 0.3); border-radius: 4px; margin: -10px auto 20px; }

  @media (min-width: 640px) {
    .modal-overlay { align-items: center; padding: 20px; }
    .modal-card { border-radius: 20px; border-bottom: 1px solid rgba(47, 92, 61, 0.4); transform: translateY(30px) scale(0.95); opacity: 0; }
    .modal-overlay.show .modal-card { transform: translateY(0) scale(1); opacity: 1; }
    .drag-handle { display: none; }
  }

  .modal-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 6px; }
  .close-btn { background: rgba(255,255,255,0.05); border: 1px solid transparent; color: var(--text-dim); font-size: 20px; cursor: pointer; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
  .close-btn:hover { background: rgba(74,222,128,0.1); color: var(--moss-soft); border-color: var(--moss-dim); }
  .title-input { background: transparent; border: none; outline: none; color: var(--moss-soft); font-family: 'Cinzel', serif; font-weight: 600; font-size: 26px; letter-spacing: .5px; text-shadow: 0 0 16px rgba(74,222,128,0.25); width: 100%; padding: 0; }
  .title-input::placeholder { color: rgba(139, 163, 148, 0.5); text-shadow: none; }
  .save-status { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-faint); margin-bottom: 20px; min-height: 15px; transition: color 0.3s; }
  .save-status.on { color: var(--moss); text-shadow: 0 0 8px rgba(74,222,128,0.4); }
  .save-status.err { color: var(--danger); text-shadow: 0 0 8px rgba(201,106,90,0.4); }
  .growth-readout { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .3px; color: var(--text-dim); margin: -10px 0 18px; }

  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 18px; }
  .field { display: flex; flex-direction: column; gap: 8px; } .field.full { grid-column: 1 / -1; }
  .field label, .notes-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-dim); }
  .field input { height: 46px; background: rgba(0,0,0,0.3); border: 1px solid var(--line); color: var(--text-main); font-family: 'EB Garamond', serif; font-size: 16px; padding: 0 14px; border-radius: 8px; outline: none; transition: all .2s; width: 100%; }
  .field input:focus, .notes-area:focus { border-color: var(--moss-dim); box-shadow: 0 0 0 3px rgba(74,222,128,0.08); background: rgba(20, 36, 26, 0.4); }
  .notes-area { width: 100%; min-height: 130px; background: rgba(0,0,0,0.3); border: 1px solid var(--line); border-radius: 10px; color: var(--text-main); font-family: 'EB Garamond', serif; font-size: 16px; line-height: 1.6; padding: 16px; outline: none; resize: vertical; transition: all .2s; margin-top: 8px; }

  .modal-footer { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 12px; margin-top: 24px; padding-top: 20px; border-top: 1px solid rgba(28, 46, 32, 0.6); }
  .done-toggle { display: flex; align-items: center; gap: 10px; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; color: var(--text-dim); cursor: pointer; user-select: none; }
  .done-toggle input { accent-color: var(--amber); width: 18px; height: 18px; cursor: pointer; }
  .footer-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .prune-btn { background: transparent; border: 1px solid var(--moss-dim); color: var(--moss-soft); font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: .5px; padding: 10px 16px; border-radius: 8px; cursor: pointer; transition: all .2s; white-space: nowrap; }
  .prune-btn:hover { background: rgba(74,222,128,0.12); border-color: var(--moss); }
  .delete-btn { background: transparent; border: 1px solid rgba(201,106,90,0.3); color: var(--danger); font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: .5px; padding: 10px 16px; border-radius: 8px; cursor: pointer; transition: all .2s; white-space: nowrap; }
  .delete-btn:hover { background: rgba(201,106,90,0.15); border-color: var(--danger); }

  /* ---------- underground (archive) panel ---------- */
  .ug-bulk { margin-bottom: 16px; }
  .ug-bulk button { width: 100%; text-align: center; }
  .ug-list { display: flex; flex-direction: column; gap: 8px; max-height: 55vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .ug-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; background: rgba(0,0,0,0.25); border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px; animation: regrowFade .3s ease both; }
  .ug-row-main { min-width: 0; }
  .ug-row-title { font-family: 'EB Garamond', serif; font-size: 15px; color: var(--text-main); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ug-row-meta { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-faint); margin-top: 3px; letter-spacing: .3px; }
  .ug-row-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .ug-row-actions button { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--line); background: rgba(0,0,0,0.2); color: var(--text-dim); cursor: pointer; font-size: 14px; transition: all .2s; }
  .ug-restore:hover { border-color: var(--moss); color: var(--moss-soft); background: rgba(74,222,128,0.1); }
  .ug-forget:hover { border-color: var(--danger); color: var(--danger); background: rgba(201,106,90,0.12); }
  .ug-empty { text-align: center; color: var(--text-faint); font-style: italic; padding: 34px 10px; font-size: 14.5px; line-height: 1.5; }
  .ug-subhead { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .3px; color: var(--text-dim); margin: -8px 0 18px; }

  .hint-overlay { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 10; color: var(--text-faint); font-size: 13px; font-family: 'JetBrains Mono', monospace; pointer-events: none; text-align: center; }

  /* ---------- leaf peek bubble (long-press preview) ---------- */
  .peek-bubble {
    position: fixed; z-index: 22; max-width: 260px; background: rgba(11, 18, 13, 0.97);
    border: 1px solid rgba(74,222,128,0.35); border-radius: 14px; padding: 14px 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6), 0 0 24px rgba(74,222,128,0.12);
    opacity: 0; transform: translate(-50%, -100%) scale(.92); transform-origin: bottom center;
    pointer-events: none; transition: opacity .16s ease, transform .16s ease; will-change: transform, opacity;
  }
  .peek-bubble.show { opacity: 1; transform: translate(-50%, calc(-100% - 16px)) scale(1); }
  .peek-bubble .pk-title { font-family: 'Cinzel', serif; font-size: 15px; color: var(--moss-soft); letter-spacing: .3px; margin-bottom: 4px; }
  .peek-bubble .pk-meta { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-faint); margin-bottom: 8px; line-height: 1.5; }
  .peek-bubble .pk-notes { font-family: 'EB Garamond', serif; font-size: 13.5px; color: var(--text-dim); line-height: 1.4; max-height: 72px; overflow: hidden; }
  .peek-bubble .pk-tags { margin-top: 9px; display: flex; flex-wrap: wrap; gap: 4px; }
  .peek-bubble .pk-tag { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; color: var(--moss-soft); background: rgba(74,222,128,0.12); border: 1px solid var(--moss-dim); border-radius: 999px; padding: 2px 8px; }
  .peek-bubble .pk-hint { margin-top: 9px; font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-faint); letter-spacing: .3px; }

  /* ---------- loading veil ---------- */
  .loading-veil {
    position: fixed; inset: 0; z-index: 30; background: var(--bg-deep);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
    transition: opacity .5s ease, visibility .5s ease;
  }
  .loading-veil.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  .loading-leaf { width: 34px; height: 34px; animation: loadSway 1.4s ease-in-out infinite; filter: drop-shadow(0 0 10px rgba(74,222,128,0.5)); }
  @keyframes loadSway { 0%, 100% { transform: rotate(-14deg) scale(1); } 50% { transform: rotate(14deg) scale(1.08); } }
  .loading-veil span { font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 1.5px; color: var(--text-faint); text-transform: uppercase; }

  /* ---------- toast ---------- */
  .toast-host { position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%); z-index: 25; display: flex; flex-direction: column; gap: 8px; align-items: center; pointer-events: none; }
  .toast {
    pointer-events: auto; display: flex; align-items: center; gap: 14px;
    background: rgba(11, 18, 13, 0.95); border: 1px solid rgba(47, 92, 61, 0.6); border-radius: 999px;
    padding: 10px 10px 10px 18px; box-shadow: 0 8px 28px rgba(0,0,0,0.6), 0 0 20px rgba(74,222,128,0.08);
    font-family: 'JetBrains Mono', monospace; font-size: 12.5px; color: var(--text-dim);
    animation: toastIn .35s cubic-bezier(0.2,0.8,0.2,1);
  }
  .toast.leaving { animation: toastOut .3s ease forwards; }
  @keyframes toastIn { 0% { opacity: 0; transform: translateY(14px) scale(.95); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes toastOut { 0% { opacity: 1; } 100% { opacity: 0; transform: translateY(8px) scale(.97); } }
  .toast button { background: rgba(74,222,128,0.1); border: 1px solid var(--moss-dim); color: var(--moss-soft); font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: .5px; padding: 7px 14px; border-radius: 999px; cursor: pointer; transition: all .2s; white-space: nowrap; }
  .toast button:hover { background: rgba(74,222,128,0.2); box-shadow: 0 0 12px rgba(74,222,128,0.25); }

  @media (max-width: 480px) {
    .brand h1 { display: none; } .field-row { grid-template-columns: 1fr; gap: 12px; }
    .topbar { padding: 12px 16px; gap: 10px; flex-wrap: wrap; row-gap: 8px; }
    .brand { order: 1; }
    .search-wrap { order: 3; flex: 1 1 100%; }
    .wind-btn { order: 2; }
    .fab { bottom: 24px; right: 20px; width: 56px; height: 56px; font-size: 24px; }
    .modal-card { padding: 22px 18px 28px; }
    .filterbar { padding: 7px 16px; top: 116px; }
    .canvas-wrap { top: 160px; }
    .zoom-controls { left: 16px; bottom: 24px; }
    .zc-btn { width: 40px; height: 40px; font-size: 16px; }
    .zc-center { font-size: 13px; }
    .hint-overlay { display: none; }
    .search-wrap input { padding-right: 62px; }
    .peek-bubble { max-width: 220px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .leaf-group, .firefly, .fab, .loading-leaf, .tag-link { animation: none !important; }
    #zoomContainer.smooth-cam { transition: none !important; }
    .leaf-group, .modal-card, .toast, .peek-bubble { transition-duration: .01s !important; }
  }
</style>
</head>
<body>

<div class="canopy"></div>
<div id="fireflies"></div>

<div class="loading-veil" id="loadingVeil">
  <svg class="loading-leaf" viewBox="-20 -50 40 55"><path fill="#4ade80" d="M0,-2 C -13,-13 -9,-30 -3,-38 L0,-45 L3,-38 C 9,-30 13,-13 0,-2 Z"/></svg>
  <span>Waking the grove…</span>
</div>

<div class="topbar">
  <div class="brand"><span class="glyph">🜃</span><h1>UNDERGROVE</h1><span class="leaf-count" id="leafCount"></span></div>
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search the tree…" autocomplete="off">
    <span class="search-badge" id="searchBadge"></span>
  </div>
  <button class="wind-btn" id="undergroundBtn" aria-label="The Underground" title="The Underground — pruned leaves (U)">🕳️<span class="ug-badge" id="ugBadge"></span></button>
  <button class="wind-btn" id="clearAll" aria-label="Clear the grove" title="Let the wind take every leaf">💨</button>
</div>

<div class="filterbar" id="filterbar">
  <button class="chip active" data-filter="all">All</button>
  <button class="chip" data-filter="upcoming">Upcoming</button>
  <button class="chip" data-filter="done">Turned</button>
  <button class="chip chip-accent" id="jumpNext" title="Jump to the next upcoming leaf (J)">🎯 Next</button>
</div>

<!-- Custom Map Engine Canvas -->
<div class="canvas-wrap" id="canvasWrap">
  <div id="zoomContainer">
    <div class="tree-glow"></div>
    <svg id="treeSvg" xmlns="http://www.w3.org/2000/svg"></svg>
    <svg id="treeSvgFocus" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>

<div class="hint-overlay">drag to pan · scroll or pinch to zoom · hold a leaf to peek</div>

<div class="zoom-controls" id="zoomControls">
  <button class="zc-btn" id="zoomInBtn" aria-label="Zoom in" title="Zoom in (+)">+</button>
  <button class="zc-btn" id="zoomOutBtn" aria-label="Zoom out" title="Zoom out (-)">−</button>
  <button class="zc-btn zc-center" id="recenterBtn" aria-label="Recenter tree" title="Recenter (0)">◎</button>
  <button class="zc-btn" id="audioBtn" aria-label="Toggle forest ambience" title="Toggle forest ambience (M)">🔈</button>
</div>

<button class="quick-fab" id="quickCaptureBtn" aria-label="Quick capture" title="Quick Capture — rapid leaf planting (Q)">⚡</button>
<button class="fab" id="fab" aria-label="Plant a new leaf" title="Plant a new leaf (N)">✦</button>

<div class="modal-overlay" id="overlay">
  <div class="modal-card" id="modalCard"></div>
</div>

<div class="modal-overlay" id="ugOverlay">
  <div class="modal-card" id="ugCard"></div>
</div>

<div class="focus-overlay" id="focusOverlay">
  <button class="close-btn focus-close" id="focusClose" aria-label="Exit quick capture">✕</button>
  <div class="focus-inner">
    <div class="focus-glyph">🌱</div>
    <div class="focus-label">Quick Capture</div>
    <input type="text" id="focusInput" class="focus-input" placeholder="What's on your mind…" autocomplete="off">
    <input type="text" id="focusTags" class="focus-tags-input" placeholder="tags (optional, comma separated)" autocomplete="off">
    <div class="focus-hint">Enter to plant · Esc to exit</div>
    <div class="focus-session" id="focusSession"></div>
  </div>
</div>

<div class="peek-bubble" id="peekBubble"></div>

<div class="toast-host" id="toastHost"></div>


<script>
(function() {
  /* ---------- persistence (window.storage — personal, per-user) ---------- */
  const STORAGE_KEY = "entries";

  async function loadEntries() {
    try {
      const result = await window.storage.get(STORAGE_KEY, false);
      return result && result.value ? JSON.parse(result.value) : [];
    } catch (err) {
      console.warn("Undergrove: no saved entries yet, or failed to load.", err);
      return [];
    }
  }

  async function saveEntries(list) {
    try {
      const result = await window.storage.set(STORAGE_KEY, JSON.stringify(list), false);
      return !!result;
    } catch (err) {
      console.error("Undergrove: failed to save entries.", err);
      return false;
    }
  }

  let entries = [];
  let activeId = null, filterText = "", statusFilter = "all", lastLayout = null, newLeafId = null, hasAutoCentered = false;
  let dataReady = false;
  let searchMatches = [], searchMatchIndex = 0;
  let lastOverflowCount = 0, overflowNudged = false;
  let focusedLeafId = null;

  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
  function hashCode(str) { let h = 0; for (let i = 0; i < str.length; i++) { h = (h * 31 + str.charCodeAt(i)) >>> 0; } return h; }
  function escapeHtml(s) { return (s || "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function truncate(s, n) { s = s || "Untitled leaf"; return s.length > n ? s.slice(0, n - 1) + "…" : s; }
  function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

  /* ---------- organic growth: word count → leaf size/shape ---------- */
  function wordCount(entry) { return ((entry.title || "") + " " + (entry.notes || "")).trim().split(/\s+/).filter(Boolean).length; }
  function growthStage(wc) {
    if (wc < 6) return { scale: 0.66 + Math.min(1, wc / 6) * 0.14, bud: true, label: "Bud" };
    const t = Math.min(1, Math.log(wc + 1) / Math.log(120));
    if (wc < 25) return { scale: 0.86 + t * 0.3, bud: false, label: "Sprouting" };
    if (wc < 90) return { scale: 0.9 + t * 0.4, bud: false, label: "Leafing" };
    return { scale: Math.min(1.5, 0.95 + t * 0.55), bud: false, label: "Full leaf" };
  }

  /* ---------- organic aging: time since last tended → leaf color ---------- */
  function hexLerp(a, b, t) {
    const pa = [1, 3, 5].map(i => parseInt(a.substr(i, 2), 16)), pb = [1, 3, 5].map(i => parseInt(b.substr(i, 2), 16));
    return "#" + pa.map((v, i) => Math.round(v + (pb[i] - v) * Math.max(0, Math.min(1, t))).toString(16).padStart(2, "0")).join("");
  }
  function leafFreshness(updatedAt) {
    const days = Math.max(0, (Date.now() - (updatedAt || Date.now())) / 86400000);
    const BASE_FILL = "#245234", BASE_STROKE = "#4ade80";
    if (days <= 30) {
      const t = days / 30;
      return { fill: hexLerp("#6fe9a0", BASE_FILL, t), stroke: hexLerp("#a8ffce", BASE_STROKE, t), fresh: days <= 2.5, days };
    }
    const t2 = Math.min(1, (days - 30) / 100);
    return { fill: hexLerp(BASE_FILL, "#5c4a30", t2), stroke: hexLerp(BASE_STROKE, "#8a6f45", t2), fresh: false, days };
  }
  function freshnessLabel(days) {
    if (days <= 2.5) return "tended today";
    if (days < 14) return `tended ${Math.round(days)}d ago`;
    if (days < 45) return `resting ${Math.round(days)}d — could use a visit`;
    return `wilting — untouched ${Math.round(days)}d`;
  }

  /* ---------- toast (undo) ---------- */
  function showToast(message, { actionLabel, onAction, duration = 6000 } = {}) {
    const host = document.getElementById("toastHost");
    const el = document.createElement("div");
    el.className = "toast";
    el.innerHTML = `<span>${escapeHtml(message)}</span>`;
    if (actionLabel && onAction) {
      const btn = document.createElement("button");
      btn.textContent = actionLabel;
      btn.addEventListener("click", () => { dismiss(); onAction(); });
      el.appendChild(btn);
    }
    host.appendChild(el);
    let dismissed = false;
    function dismiss() {
      if (dismissed) return; dismissed = true;
      el.classList.add("leaving");
      setTimeout(() => el.remove(), 300);
    }
    const t = setTimeout(dismiss, duration);
    el._dismiss = () => { clearTimeout(t); dismiss(); };
    return el;
  }

  /* ---------- PAN / ZOOM ENGINE ---------- */
  const wrap = document.getElementById('canvasWrap');
  const zoomEl = document.getElementById('zoomContainer');
  let scale = 1, panX = 0, panY = 0;
  let isDragging = false, startX = 0, startY = 0;
  let initialPinchDist = null, initialScale = 1;
  let clickStartX = 0, clickStartY = 0;
  let rafPending = false;
  const FOCUS_SCALE = 1.55;

  function updateTransform(smooth = false) {
    if (smooth) zoomEl.classList.add('smooth-cam');
    else zoomEl.classList.remove('smooth-cam');
    zoomEl.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
    if (smooth) setTimeout(() => zoomEl.classList.remove('smooth-cam'), 600);
  }

  function scheduleTransform() {
    if (rafPending) return;
    rafPending = true;
    requestAnimationFrame(() => { updateTransform(false); rafPending = false; });
  }

  /* ---------- Focus Lens: blur the grove, keep one leaf crisp ---------- */
  function setFocus(id) {
    const bgSvg = document.getElementById('treeSvg');
    const focusSvg = document.getElementById('treeSvgFocus');
    const src = bgSvg.querySelector(`.leaf-group[data-id="${id}"]`);
    if (!src) { clearFocus(); return; }
    focusedLeafId = id;
    const vb = bgSvg.getAttribute('viewBox');
    if (vb) focusSvg.setAttribute('viewBox', vb);
    focusSvg.setAttribute('width', bgSvg.getAttribute('width'));
    focusSvg.setAttribute('height', bgSvg.getAttribute('height'));
    focusSvg.innerHTML = src.outerHTML;
    bgSvg.classList.add('tree-blurred');
    focusSvg.classList.add('show');
  }
  function clearFocus() {
    if (!focusedLeafId) return;
    focusedLeafId = null;
    const bgSvg = document.getElementById('treeSvg');
    const focusSvg = document.getElementById('treeSvgFocus');
    if (bgSvg) bgSvg.classList.remove('tree-blurred');
    if (focusSvg) { focusSvg.classList.remove('show'); focusSvg.innerHTML = ''; }
  }
  function refreshFocus() {
    if (!lastLayout || lastLayout.seedling) { clearFocus(); return; }
    if (scale < FOCUS_SCALE) { clearFocus(); return; }
    const wrapRect = wrap.getBoundingClientRect();
    const cx = (wrapRect.width / 2 - panX) / scale + lastLayout.vbX;
    const cy = (wrapRect.height / 2 - panY) / scale + lastLayout.vbY;
    let best = null, bestD = Infinity;
    lastLayout.limbs.forEach(limb => limb.branches.forEach(b => {
      const d = Math.hypot(b.endX - cx, b.endY - cy);
      if (d < bestD) { bestD = d; best = b.entry; }
    }));
    if (best && bestD < 260) setFocus(best.id); else clearFocus();
  }
  const refreshFocusDebounced = debounce(refreshFocus, 120);

  function centerTree(layout, smooth = false) {
    clearFocus();
    const wrapRect = wrap.getBoundingClientRect();
    const scaleY = (wrapRect.height * 0.8) / layout.height;
    scale = Math.min(Math.max(0.4, scaleY), 1.2);
    panX = (wrapRect.width / 2) - (layout.width / 2) * scale;
    panY = wrapRect.height - layout.height * scale - 60;
    updateTransform(smooth);
  }

  function panToNode(x, y, opts = {}) {
    const wrapRect = wrap.getBoundingClientRect();
    const ox = lastLayout ? lastLayout.vbX : 0, oy = lastLayout ? lastLayout.vbY : 0;
    scale = Math.max(scale, opts.minScale || 0.9);
    panX = (wrapRect.width / 2) - (x - ox) * scale;
    panY = (wrapRect.height / 2) - (y - oy) * scale;
    updateTransform(true);
    if (opts.focusId) { clearTimeout(panToNode._ft); panToNode._ft = setTimeout(() => setFocus(opts.focusId), 280); }
    else refreshFocusDebounced();
  }

  function panToEntry(entry, opts = {}) {
    if (!lastLayout || !entry) return;
    for (const limb of lastLayout.limbs) {
      const b = limb.branches.find(br => br.entry.id === entry.id);
      if (b) { panToNode(b.endX, b.endY, opts.focus ? { minScale: 1.7, focusId: entry.id } : {}); return; }
    }
  }

  function zoomBy(delta) {
    const rect = wrap.getBoundingClientRect();
    const cx = rect.width / 2, cy = rect.height / 2;
    const newScale = Math.min(Math.max(0.2, scale + delta), 3.5);
    panX = cx - (cx - panX) * (newScale / scale);
    panY = cy - (cy - panY) * (newScale / scale);
    scale = newScale; updateTransform(true);
    refreshFocusDebounced();
  }

  // Mouse Drag
  wrap.addEventListener('mousedown', e => {
    isDragging = true; clickStartX = e.clientX; clickStartY = e.clientY;
    startX = e.clientX - panX; startY = e.clientY - panY;
  });
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    panX = e.clientX - startX; panY = e.clientY - startY; scheduleTransform();
  });
  window.addEventListener('mouseup', () => { isDragging = false; refreshFocusDebounced(); });

  // Mouse Wheel (Zoom)
  wrap.addEventListener('wheel', e => {
    e.preventDefault();
    const zoomSensitivity = 0.0015; const delta = -e.deltaY * zoomSensitivity;
    let newScale = Math.min(Math.max(0.2, scale + delta), 3.5);
    const rect = wrap.getBoundingClientRect();
    const mouseX = e.clientX - rect.left; const mouseY = e.clientY - rect.top;
    panX = mouseX - (mouseX - panX) * (newScale / scale);
    panY = mouseY - (mouseY - panY) * (newScale / scale);
    scale = newScale; scheduleTransform();
    refreshFocusDebounced();
  }, {passive: false});

  // Touch Pan/Pinch
  wrap.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      isDragging = true; clickStartX = e.touches[0].clientX; clickStartY = e.touches[0].clientY;
      startX = e.touches[0].clientX - panX; startY = e.touches[0].clientY - panY;
    } else if (e.touches.length === 2) {
      isDragging = false; initialScale = scale;
      initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    }
  }, {passive: false});

  wrap.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && isDragging) {
      panX = e.touches[0].clientX - startX; panY = e.touches[0].clientY - startY; scheduleTransform();
    } else if (e.touches.length === 2) {
      const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      const centerX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const centerY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      let newScale = Math.min(Math.max(0.2, initialScale * (dist / initialPinchDist)), 3.5);
      panX = centerX - (centerX - panX) * (newScale / scale);
      panY = centerY - (centerY - panY) * (newScale / scale);
      scale = newScale; scheduleTransform();
      refreshFocusDebounced();
    }
  }, {passive: false});

  wrap.addEventListener('touchend', e => {
    if (e.touches.length < 2) initialPinchDist = null;
    if (e.touches.length === 1) { isDragging = true; startX = e.touches[0].clientX - panX; startY = e.touches[0].clientY - panY; }
    else if (e.touches.length === 0) { isDragging = false; refreshFocusDebounced(); }
  });

  wrap.addEventListener('contextmenu', e => e.preventDefault());

  /* ---------- fireflies (fewer on small screens) ---------- */

    const host = document.getElementById("fireflies");

      const f = document.createElement("div"); f.className = "firefly";
      const size = 2 + Math.random() * 3; f.style.width = size + "px"; f.style.height = size + "px";
      f.style.left = Math.random() * 100 + "vw"; f.style.top = Math.random() * 100 + "vh";
      f.style.setProperty("--dx", (Math.random() * 200 - 100) + "px"); f.style.setProperty("--dy", (Math.random() * 200 - 100) + "px");
      f.style.animationDuration = (12 + Math.random() * 18) + "s, " + (2.5 + Math.random() * 2.5) + "s";
      f.style.animationDelay = (-Math.random() * 20) + "s, " + (-Math.random() * 3) + "s";

  }

  /* ---------- tree layout ---------- */
  const BASE_VBW = 1200, BASE_VBH = 700, GROUND_MARGIN = 56;
  const LIMBS = [ { angle: -92, baseLen: 160 }, { angle: -52, baseLen: 200 }, { angle: -14, baseLen: 220 }, { angle: 22, baseLen: 205 }, { angle: 58, baseLen: 175 }, { angle: 104, baseLen: 150 } ];

  function rotVec(x, y, theta) { const c = Math.cos(theta), s = Math.sin(theta); return [x * c - y * s, x * s + y * c]; }
  function bezierPoint(p0, c, p1, t) {
    const x = (1-t)*(1-t)*p0[0] + 2*(1-t)*t*c[0] + t*t*p1[0], y = (1-t)*(1-t)*p0[1] + 2*(1-t)*t*c[1] + t*t*p1[1];

  }
  function getSortedEntries(list) { return [...list].sort((a, b) => (new Date(a.date + 'T' + (a.time || '00:00')).getTime() || 0) - (new Date(b.date + 'T' + (b.time || '00:00')).getTime() || 0)); }

  // Which leaves get rendered when the grove is too big to draw comfortably: soonest
  // upcoming first, then most recently tended — the rest rest quietly off-canvas.
  function relevanceSort(list) {
    const now = Date.now();
    return list.slice().sort((a, b) => {
      const da = new Date(a.date + "T" + (a.time || "00:00")).getTime() || 0;
      const db = new Date(b.date + "T" + (b.time || "00:00")).getTime() || 0;

  // ---- Dynamic Links: keywords + tags automatically wire leaves into a web ----
  const STOPWORDS = new Set(["the","and","for","with","this","that","from","have","will","your","about","into","just","been","were","when","what","where","which","their","there","then","than","also","only","some","more","most","such","after","before","over","under","again","once","here","should","could","would","these","those","them","they","its","are","was","not","but","you","all","any","can","did","does","get","had","has","how","let","new","now","one","our","out","see","use","who","why","today","tomorrow"]);
  function extractKeywords(entry) {

    const words = text.match(/[a-z0-9']{4,}/g) || [];
    const seen = new Set(), out = [];
    for (const w of words) {
      const clean = w.replace(/'/g, "");

  function linkTermsOf(entry) {

  // Every connecting term (tag or keyword) gets its own stable color, so the web reads

  function termColor(term) {

  }

  function buildSeedlingLayout() {
    const vbw = 360, vbh = 300, groundY = vbh - 50, trunkTopX = vbw / 2, trunkH = 62, trunkTopY = groundY - trunkH;
    const trunkPath = `M ${trunkTopX - 5},${groundY} C ${trunkTopX - 7},${groundY - trunkH*0.6} ${trunkTopX - 2},${groundY - trunkH*0.85} ${trunkTopX - 2},${trunkTopY} L ${trunkTopX + 2},${trunkTopY} C ${trunkTopX + 2},${groundY - trunkH*0.85} ${trunkTopX + 7},${groundY - trunkH*0.6} ${trunkTopX + 5},${groundY} Z`;
    return { vbX: 0, vbY: 0, width: vbw, height: vbh, groundY, trunkTopX, trunkTopY, trunkPath, limbs: [], seedling: true };
  }

  function buildLayout(list, opts = {}) {

      const vbw = BASE_VBW, vbh = BASE_VBH, groundY = vbh - GROUND_MARGIN, trunkTopX = vbw / 2, trunkHeight = 110, trunkTopY = groundY - trunkHeight;

    for (let s = 0; s <= 18; s++) {

      tLeft.push([trunkTopX - halfw + sway, y]); tRight.push([trunkTopX + halfw + sway, y]);

    let trunkPath = "M " + tLeft.map(p => p.join(",")).join(" L ") + " L " + tRight.slice().reverse().map(p => p.join(",")).join(" L ") + " Z";

        const baseSeed = hashCode("filler-" + li + "-" + Math.round(d));
        if (usedD.some(ud => Math.abs(ud - d) < 16)) continue;
        const [cx, cy] = centerAt(d);
        const side = (baseSeed % 2 === 0) ? 1 : -1;

  // Status/archive determine what's physically on the tree. Free-text search no longer
  // rearranges branches — it just highlights + pans, see applySearchHighlight().
  function matchesStatus(e) {
    if (statusFilter === "done" && !e.done) return false;
    if (statusFilter === "upcoming" && e.done) return false;
    return true;
  }
  function matchesText(e, q) {
    if (!q) return true;
    return (e.title + " " + e.location + " " + e.notes + " " + (e.tags || "")).toLowerCase().includes(q);
  }

  function updateLeafCount() {
    const el = document.getElementById("leafCount");
    if (!el) return;
    const active = entries.filter(e => !e.archived);
    if (!active.length) { el.textContent = ""; return; }
    const doneCount = active.filter(e => e.done).length;
    const compact = window.innerWidth < 480;
    if (compact) {
      el.textContent = `${active.length}·${doneCount}✓${lastOverflowCount ? ` +${lastOverflowCount}` : ''}`;
    } else {
      el.textContent = `${active.length} leaf${active.length === 1 ? '' : 'ves'} · ${doneCount} turned${lastOverflowCount ? ` · +${lastOverflowCount} off-tree` : ''}`;
    }
  }

  function updateUgBadge() {
    const el = document.getElementById('ugBadge');
    if (!el) return;
    const n = entries.filter(e => e.archived).length;
    el.textContent = n ? n : '';
  }

  function updateSearchBadge(q, count) {
    const el = document.getElementById('searchBadge');
    if (!el) return;
    if (!q) { el.textContent = ''; el.className = 'search-badge'; return; }
    if (count === 0) { el.textContent = 'none found'; el.className = 'search-badge none'; }
    else { el.textContent = count + ' found ⏎'; el.className = 'search-badge match'; }
  }

  function render() {
    const svg = document.getElementById("treeSvg");
    let defs = `<defs><radialGradient id="groundGlow" cx="50%" cy="100%" r="70%"><stop offset="0%" stop-color="rgba(74,222,128,0.12)"/><stop offset="100%" stop-color="rgba(74,222,128,0)"/></radialGradient></defs>`;

    // is capped so a big grove never has to draw everything at once (this is the main
    // lag fix: fewer live leaves on screen, the rest rest safely off-canvas).
    let list = entries.filter(e => !e.archived && matchesStatus(e));
    const totalActive = entries.filter(e => !e.archived).length;
    const MAX_RENDERED = window.innerWidth < 480 ? 16 : 24;
    lastOverflowCount = 0;
    if (list.length > MAX_RENDERED) {
      const sorted = relevanceSort(list);

    }

    const layout = buildLayout(list, { trueEmpty: totalActive === 0 });

    if (layout.seedling) {

      svg.setAttribute("height", layout.height);

      if (!hasAutoCentered) { setTimeout(() => { centerTree(layout); hasAutoCentered = true; }, 50); }
      const ground = `<ellipse cx="${layout.trunkTopX}" cy="${layout.groundY + 8}" rx="${layout.width * 0.28}" ry="20" fill="url(#groundGlow)"/>`;
      const budD = "M0,-1 C -5,-5 -4,-10 -1,-13 L0,-15 L1,-13 C 4,-10 5,-5 0,-1 Z";
      const seedLeaves = `
        <g class="leaf-group leaf-bud" style="animation-duration:4.2s;" transform="translate(${layout.trunkTopX - 9},${layout.trunkTopY}) rotate(-28)"><path class="leaf-body" d="${budD}" style="--leaf-fill:#6fe9a0; --leaf-stroke:#a8ffce;"/></g>
        <g class="leaf-group leaf-bud" style="animation-duration:3.6s;" transform="translate(${layout.trunkTopX + 9},${layout.trunkTopY}) rotate(28)"><path class="leaf-body" d="${budD}" style="--leaf-fill:#6fe9a0; --leaf-stroke:#a8ffce;"/></g>
      `;
      const msg = `<text class="empty-note" x="${layout.trunkTopX}" y="${layout.groundY - 150}">A seedling, waiting — press ✦ to plant your first leaf</text>`;
      svg.innerHTML = defs + ground + `<path class="trunk" d="${layout.trunkPath}"/>` + seedLeaves + msg;
      updateLeafCount(); updateUgBadge();
      document.getElementById("clearAll").disabled = entries.length === 0;
      applySearchHighlight();
      clearFocus();
      return;
    }

    let limbPaths = "", branchesSvg = "", fillerSvg = "", leavesSvg = "";
    const miniLeafD = "M0,-1 C -7,-7 -5,-16 -1,-20 L0,-23 L1,-20 C 5,-16 7,-7 0,-1 Z";
    const budD = "M0,-1 C -5,-5 -4,-10 -1,-13 L0,-15 L1,-13 C 4,-10 5,-5 0,-1 Z";
    const leafD = "M0,-2 C -13,-13 -9,-30 -3,-38 L0,-45 L3,-38 C 9,-30 13,-13 0,-2 Z";
    const positionById = {};
    const heavy = list.length > 14; // above this, drop the sway animation to keep frame rate smooth

    layout.limbs.forEach(limb => {
      limbPaths += `<path class="trunk" d="${limb.path}"/>`;
      fillerSvg += limb.fillerTwigs.map(tw => {
        const deepCls = tw.deep ? " twig-deep" : "";
        const leafScale = (tw.deep ? 0.72 : 1) * tw.sizeFactor;
        const strokeW = (tw.deep ? 1.8 : 2.5) * tw.sizeFactor;
        return `<path class="twig${deepCls}" d="M ${tw.x1},${tw.y1} L ${tw.x2},${tw.y2}" stroke-width="${strokeW.toFixed(2)}"/><g transform="translate(${tw.x2},${tw.y2}) rotate(${tw.angle}) scale(${leafScale.toFixed(2)})"><path class="mini-leaf${deepCls}" d="${miniLeafD}"/></g>`;
      }).join("");

        const strokeW = 5 + (hashCode(b.entry.id) % 3);

        branchesSvg += b.twigs.map(tw => `<path class="twig" d="M ${tw.x1},${tw.y1} L ${tw.x2},${tw.y2}" stroke-width="3"/><g transform="translate(${tw.x2},${tw.y2}) rotate(${tw.angle}) scale(1.3)"><path class="mini-leaf" d="${miniLeafD}"/></g>`).join("");

    });

    // ---- Dynamic Links: an automatic web between leaves that share a tag or a keyword ----
    // Tags are the strongest signal (drawn first, thicker, higher priority); shared keywords
    // pulled from title/notes fill in the rest, neural-net style. Every distinct connecting
    // term gets its own stable color, so different tags/keywords read as different colored
    // threads through the tree, and a shared budget keeps a big grove from turning to static.
    let linksSvg = "";
    const termMap = new Map(); // key -> { term, type, ids: [] }
    list.forEach(e => {
      const { tags, keywords } = linkTermsOf(e);
      tags.forEach(t => {
        const key = "tag:" + t;
        if (!termMap.has(key)) termMap.set(key, { term: t, type: "tag", ids: [] });
        termMap.get(key).ids.push(e.id);
      });
      keywords.forEach(k => {
        const key = "kw:" + k;
        if (!termMap.has(key)) termMap.set(key, { term: k, type: "keyword", ids: [] });

      });

    const pairMap = new Map();
    let linkBudget = 70;
    function addPairsForTerm(ids, term, type) {
      for (let i = 0; i < ids.length && linkBudget > 0; i++) {
        for (let j = i + 1; j < ids.length && linkBudget > 0; j++) {
          const key = ids[i] < ids[j] ? ids[i] + "|" + ids[j] : ids[j] + "|" + ids[i];
          if (pairMap.has(key)) continue;
          pairMap.set(key, { a: ids[i], b: ids[j], term, type });
          linkBudget--;
        }
      }
    }
    termMap.forEach(t => { if (t.type === "tag" && t.ids.length > 1) addPairsForTerm(t.ids, t.term, "tag"); });
    termMap.forEach(t => { if (t.type === "keyword" && t.ids.length > 1) addPairsForTerm(t.ids, t.term, "keyword"); });

    let linkMinX = layout.vbX, linkMinY = layout.vbY, linkMaxX = layout.vbX + layout.width, linkMaxY = layout.vbY + layout.height;
    pairMap.forEach(({ a: idA, b: idB, term, type }) => {
      const a = positionById[idA], b2 = positionById[idB];
      if (!a || !b2) return;
      const mx = (a.x + b2.x) / 2, my = (a.y + b2.y) / 2 - Math.hypot(b2.x - a.x, b2.y - a.y) * 0.18;
      linkMinX = Math.min(linkMinX, mx - 8); linkMaxX = Math.max(linkMaxX, mx + 8);
      linkMinY = Math.min(linkMinY, my - 8); linkMaxY = Math.max(linkMaxY, my + 8);
      const color = termColor(term);
      linksSvg += `<path class="tag-link link-${type}" data-a="${idA}" data-b="${idB}" style="--link-color:${color}" d="M ${a.x},${a.y} Q ${mx},${my} ${b2.x},${b2.y}"><title>${escapeHtml(term)}</title></path>`;
    });
    if (linkMinX < layout.vbX || linkMinY < layout.vbY || linkMaxX > layout.vbX + layout.width || linkMaxY > layout.vbY + layout.height) {
      layout.vbX = linkMinX; layout.vbY = linkMinY; layout.width = linkMaxX - linkMinX; layout.height = linkMaxY - linkMinY;
    }

    svg.setAttribute("width", layout.width);
    svg.setAttribute("height", layout.height);
    svg.setAttribute("viewBox", `${layout.vbX} ${layout.vbY} ${layout.width} ${layout.height}`);
    if (!hasAutoCentered && layout.width > 0) { setTimeout(() => { centerTree(layout); hasAutoCentered = true; }, 50); }

    let ground = `<ellipse cx="${layout.trunkTopX}" cy="${layout.groundY + 8}" rx="${layout.width * 0.35}" ry="24" fill="url(#groundGlow)"/>`;
    let emptyMsg = "";
    if (list.length === 0) {
      emptyMsg = `<text class="empty-note" x="${layout.trunkTopX}" y="${layout.groundY - 200}">No leaves in this view</text>`;
    }

    svg.innerHTML = defs + ground + `<g id="woodGroup" class="wood-group" style="transform-origin:${layout.trunkTopX}px ${layout.groundY}px"><path class="trunk" d="${layout.trunkPath}"/>${limbPaths}${fillerSvg}${branchesSvg}</g><g id="linkGroup">${linksSvg}</g><g id="leafGroup">${leavesSvg}</g>${emptyMsg}`;

    svg.querySelectorAll(".leaf-group").forEach(g => {
      const id = g.getAttribute("data-id");
      const related = svg.querySelectorAll(`.tag-link[data-a="${id}"], .tag-link[data-b="${id}"]`);
      if (!related.length) return;
      const setActive = on => related.forEach(l => l.classList.toggle("active", on));
      g.addEventListener("mouseenter", () => setActive(true));
      g.addEventListener("mouseleave", () => setActive(false));
      g.addEventListener("focus", () => setActive(true));
      g.addEventListener("blur", () => setActive(false));
    });

    svg.querySelectorAll(".leaf-group").forEach(g => {
      const entry = entries.find(e => e.id === g.getAttribute("data-id"));
      g.addEventListener("click", (e) => {
        if (g._peekSuppress) return;
        const dist = Math.hypot(e.clientX - clickStartX, e.clientY - clickStartY);
        if (dist > 8) return;
        openModal(g.getAttribute("data-id"));
      });
      g.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openModal(g.getAttribute("data-id")); }
      });
      if (entry) attachPeek(g, entry);
    });

    updateLeafCount();
    updateUgBadge();
    document.getElementById("clearAll").disabled = entries.length === 0;
    applySearchHighlight();

    if (focusedLeafId) {
      const stillThere = entries.find(e => e.id === focusedLeafId && !e.archived && matchesStatus(e));
      if (stillThere) setFocus(focusedLeafId); else clearFocus();
    }

    if (newLeafId) setTimeout(() => { newLeafId = null; }, 700);

    if (lastOverflowCount > 0 && !overflowNudged) {
      overflowNudged = true;
      showToast(`${lastOverflowCount} older leaf${lastOverflowCount === 1 ? '' : 'ves'} resting off-tree — prune to bring them back`, {
        actionLabel: "Open Underground", onAction: openUnderground, duration: 9000
      });
    }
  }

  /* ---------- leaf peek: long-press to preview without opening the full note ---------- */
  function attachPeek(g, entry) {
    let timer = null, active = false, sx = 0, sy = 0;
    function begin(x, y) {
      sx = x; sy = y; active = false;
      clearTimeout(timer);
      timer = setTimeout(() => { active = true; showPeek(entry, x, y); }, 480);
    }
    function move(x, y) {
      if (Math.hypot(x - sx, y - sy) > 12) {
        clearTimeout(timer);
        if (active) { hidePeek(); active = false; }
      }
    }
    function end() {
      clearTimeout(timer);
      if (active) {
        hidePeek(); active = false;
        g._peekSuppress = true; setTimeout(() => { g._peekSuppress = false; }, 80);
      }
    }
    g.addEventListener('touchstart', e => begin(e.touches[0].clientX, e.touches[0].clientY), {passive: true});
    g.addEventListener('touchmove', e => move(e.touches[0].clientX, e.touches[0].clientY), {passive: true});
    g.addEventListener('touchend', end);
    g.addEventListener('touchcancel', end);
    g.addEventListener('mousedown', e => { if (e.button !== 0) return; begin(e.clientX, e.clientY); });
    g.addEventListener('mousemove', e => { if (timer || active) move(e.clientX, e.clientY); });
    g.addEventListener('mouseup', end);
    g.addEventListener('mouseleave', () => { if (active) end(); else clearTimeout(timer); });
  }

  function showPeek(entry, x, y) {
    const el = document.getElementById('peekBubble');
    const fresh = leafFreshness(entry.updatedAt);
    const tags = (entry.tags || "").split(",").map(t => t.trim()).filter(Boolean);
    el.innerHTML = `
      <div class="pk-title">${escapeHtml(entry.title || 'Untitled leaf')}${entry.done ? ' ✓' : ''}</div>
      <div class="pk-meta">${[escapeHtml(entry.date || ''), entry.time ? escapeHtml(entry.time) : '', entry.location ? escapeHtml(entry.location) : ''].filter(Boolean).join(' · ')}${entry.date || entry.time || entry.location ? ' · ' : ''}${freshnessLabel(fresh.days)}</div>
      ${entry.notes ? `<div class="pk-notes">${escapeHtml(truncate(entry.notes, 140))}</div>` : ''}
      ${tags.length ? `<div class="pk-tags">${tags.map(t => `<span class="pk-tag">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
      <div class="pk-hint">release to dismiss · tap to open</div>
    `;
    const vw = window.innerWidth;
    const clampedX = Math.min(Math.max(x, 140), vw - 140);
    const clampedY = Math.max(y, 110);
    el.style.left = clampedX + 'px'; el.style.top = clampedY + 'px';
    el.classList.add('show');
    if (navigator.vibrate) { try { navigator.vibrate(12); } catch (err) {} }
  }
  function hidePeek() { document.getElementById('peekBubble').classList.remove('show'); }

  /* ---------- dynamic search: camera pans/zooms to matches, tree stays put ---------- */
  function applySearchHighlight() {
    const svg = document.getElementById('treeSvg');
    const q = filterText.trim().toLowerCase();
    const groups = svg.querySelectorAll('.leaf-group[data-id]');
    const matches = [];
    groups.forEach(g => {
      const id = g.getAttribute('data-id');
      const entry = entries.find(e => e.id === id);
      if (!entry) return;
      if (!q) { g.classList.remove('search-dim', 'search-match'); return; }
      const isMatch = matchesText(entry, q);
      g.classList.toggle('search-match', isMatch);
      g.classList.toggle('search-dim', !isMatch);
      if (isMatch) matches.push(entry);
    });
    searchMatches = matches; searchMatchIndex = 0;
    updateSearchBadge(q, matches.length);
  }

  function runSearch(newText) {
    const prevQ = filterText.trim();
    filterText = newText;
    const q = filterText.trim();
    applySearchHighlight();
    if (q && q !== prevQ && searchMatches.length) panToEntry(searchMatches[0], { focus: true });
  }

  function cycleSearchMatch() {
    if (!searchMatches.length) return;
    searchMatchIndex = (searchMatchIndex + 1) % searchMatches.length;
    panToEntry(searchMatches[searchMatchIndex], { focus: true });
  }

  /* ---------- modal interactions ---------- */
  function openModal(id) {
    activeId = id; const entry = entries.find(e => e.id === id); if (!entry) return;
    const overlay = document.getElementById("overlay"), card = document.getElementById("modalCard");
    card.innerHTML = `
      <div class="drag-handle"></div>
      <div class="modal-top">
        <input type="text" class="title-input" id="f-title" placeholder="Untitled leaf…" value="${escapeHtml(entry.title)}">
        <button class="close-btn" id="closeModal" aria-label="Close">✕</button>
      </div>
      <div class="save-status" id="saveStatus" aria-live="polite">Saved to your grove</div>
      <div class="growth-readout" id="growthReadout"></div>
      <div class="field-row">
        <div class="field"><label>Date</label><input type="date" id="f-date" value="${entry.date || ''}"></div>
        <div class="field"><label>Time</label><input type="time" id="f-time" value="${entry.time || ''}"></div>
        <div class="field full"><label>Location</label><input type="text" id="f-location" placeholder="e.g. The old oak library" value="${escapeHtml(entry.location)}"></div>
        <div class="field full"><label>Tags</label><input type="text" id="f-tags" placeholder="e.g. project-x, ideas — shared tags (and shared words in your notes) automatically wire related leaves together" value="${escapeHtml(entry.tags || '')}"></div>
      </div>
      <div class="notes-label">Notes &amp; Details</div>
      <textarea class="notes-area" id="f-notes" placeholder="What needs doing, remembering, or tending to…">${escapeHtml(entry.notes)}</textarea>
      <div class="modal-footer">
        <label class="done-toggle"><input type="checkbox" id="f-done" ${entry.done ? 'checked' : ''}> Mark as complete</label>
        <div class="footer-actions">
          <button class="prune-btn" id="pruneBtn" title="Move to the Underground">↓ Prune</button>
          <button class="delete-btn" id="deleteBtn">✕ Remove</button>
        </div>
      </div>
    `;

    function refreshGrowthReadout() {
      const el = document.getElementById("growthReadout"); if (!el) return;
      const wc = wordCount(entry), growth = growthStage(wc), fresh = leafFreshness(entry.updatedAt);
      el.textContent = `${growth.bud ? "🌱" : "🍃"} ${growth.label} · ${wc} word${wc === 1 ? "" : "s"} · ${freshnessLabel(fresh.days)}`;
    }
    refreshGrowthReadout();

    ["title", "date", "time", "location", "tags", "notes"].forEach(f => {
      document.getElementById("f-" + f).addEventListener("input", debounce(() => {
        entry[f] = document.getElementById("f-" + f).value;
        entry.updatedAt = Date.now();
        persist(); refreshGrowthReadout(); render();
      }, 300));
    });

    document.getElementById("f-done").addEventListener("change", (ev) => { entry.done = ev.target.checked; persist(); render(); });
    document.getElementById("pruneBtn").addEventListener("click", () => pruneEntry(id));
    document.getElementById("deleteBtn").addEventListener("click", () => {
      const idx = entries.findIndex(e => e.id === id);
      if (idx === -1) return;
      const [removed] = entries.splice(idx, 1);
      persist(); closeModal(); render();
      showToast(`"${truncate(removed.title, 24)}" removed`, {
        actionLabel: "Undo",
        onAction: () => { entries.splice(idx, 0, removed); persist(); render(); }
      });
    });
    document.getElementById("closeModal").addEventListener("click", closeModal);
    overlay.classList.add("show");
  }

  function closeModal() { document.getElementById("overlay").classList.remove("show"); activeId = null; }
  document.getElementById("overlay").addEventListener("click", (e) => { if (e.target.id === "overlay") closeModal(); });

  function persist() {
    saveEntries(entries).then(ok => {
      const status = document.getElementById("saveStatus");
      if (!status) return;
      if (ok) {
        status.textContent = "✓ Saved to your grove"; status.classList.remove("err"); status.classList.add("on");
      } else {
        status.textContent = "⚠ Couldn't save — check your connection"; status.classList.remove("on"); status.classList.add("err");
        return;
      }
      clearTimeout(persist._t);
      persist._t = setTimeout(() => { if (status) { status.textContent = "Saved to your grove"; status.classList.remove("on"); } }, 1500);
    });
  }

  /* ---------- pruning / the Underground (archive) ---------- */
  function pruneEntry(id) {
    const entry = entries.find(e => e.id === id);
    if (!entry) return;
    entry.archived = true; entry.archivedAt = Date.now();
    persist(); closeModal(); render();
    showToast(`"${truncate(entry.title, 24)}" sent to the Underground`, {
      actionLabel: "Undo",
      onAction: () => { entry.archived = false; persist(); render(); }
    });
  }

  function autoPrune() {
    const cutoff = Date.now() - 30 * 86400000;
    const toPrune = entries.filter(e => !e.archived && e.done && (e.updatedAt || 0) < cutoff);
    if (!toPrune.length) { showToast("Nothing old enough to prune yet"); return; }
    toPrune.forEach(e => { e.archived = true; e.archivedAt = Date.now(); });
    persist(); render(); renderUnderground();
    showToast(`${toPrune.length} leaf${toPrune.length === 1 ? '' : 'ves'} pruned to the Underground`, {
      actionLabel: "Undo", duration: 8000,
      onAction: () => { toPrune.forEach(e => { e.archived = false; }); persist(); render(); renderUnderground(); }
    });
  }

  function restoreEntry(id) {
    const e = entries.find(x => x.id === id);
    if (!e) return;
    e.archived = false; e.updatedAt = Date.now(); newLeafId = id;
    persist(); closeUnderground(); render();
    showToast(`"${truncate(e.title, 24)}" returned to the tree`);
  }

  function forgetForever(id) {
    if (!confirm("Forget this leaf forever? This cannot be undone.")) return;
    const idx = entries.findIndex(x => x.id === id);
    if (idx === -1) return;
    entries.splice(idx, 1);
    persist(); renderUnderground(); updateLeafCount(); updateUgBadge();
  }

  function renderUnderground() {
    const card = document.getElementById('ugCard');
    const archived = entries.filter(e => e.archived).sort((a, b) => (b.archivedAt || 0) - (a.archivedAt || 0));
    updateUgBadge();
    let rows = archived.map(e => {
      const fresh = leafFreshness(e.archivedAt || e.updatedAt);
      return `
        <div class="ug-row" data-id="${e.id}">
          <div class="ug-row-main">
            <div class="ug-row-title">${escapeHtml(e.title || 'Untitled leaf')}${e.done ? ' ✓' : ''}</div>
            <div class="ug-row-meta">${[escapeHtml(e.date || ''), e.time ? escapeHtml(e.time) : ''].filter(Boolean).join(' ')}${e.date ? ' · ' : ''}buried ${Math.round(fresh.days)}d ago</div>
          </div>
          <div class="ug-row-actions">
            <button class="ug-restore" data-id="${e.id}" title="Restore to the tree" aria-label="Restore">↑</button>
            <button class="ug-forget" data-id="${e.id}" title="Forget forever" aria-label="Forget forever">✕</button>
          </div>
        </div>`;
    }).join('');
    if (!archived.length) rows = `<div class="ug-empty">Nothing buried yet.<br>Pruned and old completed leaves rest here, out of the tree's way.</div>`;

    card.innerHTML = `
      <div class="drag-handle"></div>
      <div class="modal-top">
        <div><div class="title-input" style="cursor:default;">The Underground</div></div>
        <button class="close-btn" id="ugClose" aria-label="Close">✕</button>
      </div>
      <div class="ug-subhead">${archived.length} leaf${archived.length === 1 ? '' : 'ves'} resting below the roots</div>
      <div class="ug-bulk"><button class="prune-btn" id="ugAutoPrune">🍂 Auto-prune completed leaves, 30d+ untouched</button></div>
      <div class="ug-list">${rows}</div>
    `;
    document.getElementById('ugClose').addEventListener('click', closeUnderground);
    const autoBtn = document.getElementById('ugAutoPrune');
    if (autoBtn) autoBtn.addEventListener('click', autoPrune);
    card.querySelectorAll('.ug-restore').forEach(b => b.addEventListener('click', () => restoreEntry(b.getAttribute('data-id'))));
    card.querySelectorAll('.ug-forget').forEach(b => b.addEventListener('click', () => forgetForever(b.getAttribute('data-id'))));
  }

  function openUnderground() { renderUnderground(); document.getElementById('ugOverlay').classList.add('show'); }
  function closeUnderground() { document.getElementById('ugOverlay').classList.remove('show'); }
  document.getElementById('undergroundBtn').addEventListener('click', openUnderground);
  document.getElementById('ugOverlay').addEventListener('click', (e) => { if (e.target.id === 'ugOverlay') closeUnderground(); });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      if (document.getElementById("overlay").classList.contains("show")) closeModal();
      if (document.getElementById("ugOverlay").classList.contains("show")) closeUnderground();
    }
  });

  /* ---------- global events ---------- */
  document.getElementById("fab").addEventListener("click", () => {
    if (!dataReady) return;
    const e = { id: uid(), title: "", date: new Date().toISOString().slice(0, 10), time: "", location: "", notes: "", tags: "", done: false, archived: false, archivedAt: null, updatedAt: Date.now() };
    entries.push(e); newLeafId = e.id; persist(); render();
    setTimeout(() => openModal(e.id), 700);
  });

  document.getElementById("search").addEventListener("input", debounce((e) => { runSearch(e.target.value); }, 150));
  document.getElementById("search").addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); cycleSearchMatch(); }
    if (e.key === "Escape") { e.target.value = ""; runSearch(""); e.target.blur(); }
  });

  document.querySelectorAll(".chip[data-filter]").forEach(btn => {
    btn.addEventListener("click", () => {
      statusFilter = btn.getAttribute("data-filter");
      document.querySelectorAll(".chip[data-filter]").forEach(b => b.classList.toggle("active", b === btn));
      render();
    });
  });

  function jumpToNext() {
    if (!lastLayout) return;
    const visible = entries.filter(e => !e.archived && matchesStatus(e));
    if (!visible.length) { showToast("No leaves match right now"); return; }
    const now = Date.now();
    let target = null, bestDiff = Infinity;
    visible.forEach(e => {
      if (e.done) return;
      const dt = new Date(e.date + "T" + (e.time || "00:00")).getTime();
      if (!isNaN(dt)) { const diff = dt - now; if (diff >= 0 && diff < bestDiff) { bestDiff = diff; target = e; } }
    });
    if (!target) target = visible.slice().reverse().find(e => !e.done) || visible[visible.length - 1];
    panToEntry(target, { focus: true });
  }
  document.getElementById("jumpNext").addEventListener("click", jumpToNext);

  document.getElementById("zoomInBtn").addEventListener("click", () => zoomBy(0.25));
  document.getElementById("zoomOutBtn").addEventListener("click", () => zoomBy(-0.25));
  document.getElementById("recenterBtn").addEventListener("click", () => { if (lastLayout) centerTree(lastLayout, true); });

  document.addEventListener("keydown", (e) => {
    const tag = (e.target.tagName || "").toLowerCase();
    if (tag === "input" || tag === "textarea" || e.target.isContentEditable) return;
    if (document.getElementById("overlay").classList.contains("show")) return;
    if (document.getElementById("ugOverlay").classList.contains("show")) return;
    const step = 70;
    switch (e.key) {
      case "ArrowUp": panY += step; updateTransform(true); refreshFocusDebounced(); e.preventDefault(); break;
      case "ArrowDown": panY -= step; updateTransform(true); refreshFocusDebounced(); e.preventDefault(); break;
      case "ArrowLeft": panX += step; updateTransform(true); refreshFocusDebounced(); e.preventDefault(); break;
      case "ArrowRight": panX -= step; updateTransform(true); refreshFocusDebounced(); e.preventDefault(); break;
      case "+": case "=": zoomBy(0.2); e.preventDefault(); break;
      case "-": case "_": zoomBy(-0.2); e.preventDefault(); break;
      case "0": if (lastLayout) centerTree(lastLayout, true); e.preventDefault(); break;
      case "/": document.getElementById("search").focus(); e.preventDefault(); break;
      case "j": case "J": jumpToNext(); e.preventDefault(); break;
      case "n": case "N": document.getElementById("fab").click(); e.preventDefault(); break;
      case "u": case "U": openUnderground(); e.preventDefault(); break;
    }
  });

  window.addEventListener("resize", debounce(() => { if (lastLayout) centerTree(lastLayout, true); }, 200));

  document.getElementById("clearAll").addEventListener("click", () => {
    if (entries.length === 0 || !confirm("Let the wind take every leaf — including anything buried in the Underground?")) return;
    closeModal(); closeUnderground();
    const removedEntries = entries.slice();
    const svg = document.getElementById("treeSvg"), leaves = svg.querySelectorAll(".leaf-group");
    leaves.forEach(el => {
      const dx = (300 + Math.random() * 500) * (Math.random() < 0.5 ? -1 : 1), dy = -(80 + Math.random() * 200), rot = (Math.random() * 720 - 360);
      el.style.setProperty("--gx", dx + "px"); el.style.setProperty("--gy", dy + "px"); el.style.setProperty("--gr", rot + "deg");
      el.style.animation = `gustAway ${0.9 + Math.random() * 0.6}s cubic-bezier(0.2, 0.8, 0.2, 1) forwards`; el.style.animationDelay = (Math.random() * 0.4) + "s";
    });
    const wood = document.getElementById("woodGroup");
    if (wood) {
      const ox = lastLayout ? lastLayout.trunkTopX : 0, oy = lastLayout ? lastLayout.groundY : 0;
      wood.insertAdjacentHTML("beforeend", `<path class="crack-line flash" d="M ${ox-6},${oy-6} L ${ox+4},${oy-20} L ${ox-3},${oy-30}"/><path class="crack-line flash" d="M ${ox+8},${oy-4} L ${ox-2},${oy-22} L ${ox+6},${oy-34}"/>`);
      setTimeout(() => wood.classList.add("topple"), 650);
    }
    setTimeout(() => {
      entries = []; persist(); render();
      const fw = document.getElementById("woodGroup"), fl = document.getElementById("leafGroup");
      if (fw) fw.classList.add("regrow"); if (fl) fl.classList.add("regrow");
      centerTree(lastLayout, true);
      showToast(`${removedEntries.length} leaf${removedEntries.length === 1 ? '' : 'ves'} taken by the wind`, {
        actionLabel: "Undo", duration: 8000,
        onAction: () => { entries = removedEntries; persist(); hasAutoCentered = false; render(); }
      });
    }, 1800);
  });

  /* ---------- boot ---------- */
  async function init() {
    spawnFireflies();
    render(); // draws a seedling immediately so the canvas isn't blank
    const loaded = await loadEntries();
    entries = loaded.map(e => ({
      tags: "", archived: false, archivedAt: null, updatedAt: Date.parse(e.date + "T" + (e.time || "00:00")) || Date.now(),
      ...e
    }));
    dataReady = true;
    hasAutoCentered = false;
    render();
    const veil = document.getElementById("loadingVeil");
    if (veil) veil.classList.add("hidden");
  }

  init();
})();
</script>
</body>
</html>
