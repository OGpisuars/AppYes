<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undergrove — a planner for the quiet hours</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#050907;
    --bg-panel:#0b120d;
    --bg-panel-2:#101b13;
    --bg-input:#0d1712;
    --line:#1c2e20;
    --line-glow:#2f5c3d;
    --moss:#4ade80;
    --moss-soft:#7cf0a3;
    --moss-dim:#245234;
    --amber:#d9a441;
    --text-main:#d3e2d6;
    --text-dim:#8ba394;
    --text-faint:#4a5f52;
    --danger:#c96a5a;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg-deep);
    color:var(--text-main);
    font-family:'EB Garamond', serif;
    overflow:hidden;
  }

  /* ---------- atmosphere ---------- */
  .canopy{
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(ellipse 60% 40% at 15% 0%, rgba(74,222,128,0.10), transparent 60%),
      radial-gradient(ellipse 50% 35% at 85% 10%, rgba(74,222,128,0.06), transparent 60%),
      radial-gradient(ellipse 70% 50% at 50% 100%, rgba(20,40,26,0.6), transparent 70%);
  }
  .firefly{
    position:fixed; z-index:0; border-radius:50%; pointer-events:none;
    background:var(--moss-soft);
    box-shadow:0 0 6px 2px rgba(124,240,163,0.7), 0 0 16px 6px rgba(74,222,128,0.25);
    opacity:0;
    animation:drift linear infinite, glow 3.4s ease-in-out infinite;
  }
  @keyframes drift{
    0%{ transform:translate(0,0); }
    100%{ transform:translate(var(--dx), var(--dy)); }
  }
  @keyframes glow{
    0%,100%{ opacity:0; }
    15%{ opacity:.85; }
    50%{ opacity:.35; }
    85%{ opacity:.85; }
  }

  /* ---------- layout ---------- */
  .app{
    position:relative; z-index:1;
    display:grid;
    grid-template-columns:300px 1fr;
    height:100vh;
  }

  /* ---------- sidebar ---------- */
  .sidebar{
    background:linear-gradient(180deg, var(--bg-panel), #08110b 90%);
    border-right:1px solid var(--line);
    display:flex; flex-direction:column;
    position:relative;
  }
  .sidebar::after{
    content:"";
    position:absolute; top:0; right:-1px; bottom:0; width:1px;
    background:linear-gradient(180deg, transparent, var(--line-glow) 20%, var(--line-glow) 80%, transparent);
    box-shadow:0 0 8px 1px rgba(74,222,128,0.25);
  }
  .brand{
    padding:26px 22px 18px;
    border-bottom:1px solid var(--line);
  }
  .brand .glyph{
    font-size:22px; color:var(--moss); text-shadow:0 0 10px rgba(74,222,128,0.6);
  }
  .brand h1{
    font-family:'Cinzel', serif;
    font-weight:600;
    font-size:19px;
    letter-spacing:2px;
    margin:6px 0 4px;
    color:var(--moss-soft);
    text-shadow:0 0 14px rgba(74,222,128,0.35);
  }
  .brand p{
    margin:0; font-size:13px; color:var(--text-faint); font-style:italic;
  }

  .sidebar-controls{
    padding:14px 16px; display:flex; flex-direction:column; gap:10px;
    border-bottom:1px solid var(--line);
  }
  .search-wrap{ position:relative; }
  .search-wrap input{
    width:100%;
    background:var(--bg-input);
    border:1px solid var(--line);
    color:var(--text-main);
    font-family:'EB Garamond', serif;
    font-size:14px;
    padding:9px 12px 9px 30px;
    border-radius:6px;
    outline:none;
    transition:border-color .2s, box-shadow .2s;
  }
  .search-wrap input:focus{
    border-color:var(--moss-dim);
    box-shadow:0 0 0 3px rgba(74,222,128,0.08);
  }
  .search-wrap::before{
    content:"⌕";
    position:absolute; left:10px; top:50%; transform:translateY(-50%);
    color:var(--text-faint); font-size:15px;
  }
  .new-btn{
    background:linear-gradient(180deg, #163a24, #0f2a19);
    border:1px solid var(--moss-dim);
    color:var(--moss-soft);
    font-family:'Cinzel', serif;
    font-size:12.5px;
    letter-spacing:1.2px;
    padding:10px 12px;
    border-radius:6px;
    cursor:pointer;
    transition:all .2s;
  }
  .new-btn:hover{
    box-shadow:0 0 14px rgba(74,222,128,0.28);
    border-color:var(--moss);
    color:#eafff0;
  }

  .entries{
    flex:1;
    overflow-y:auto;
    padding:8px 10px 20px;
  }
  .entries::-webkit-scrollbar{ width:8px; }
  .entries::-webkit-scrollbar-thumb{ background:var(--line-glow); border-radius:4px; }

  .day-label{
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    letter-spacing:1.5px;
    color:var(--text-faint);
    text-transform:uppercase;
    padding:14px 8px 6px;
  }

  .entry-card{
    padding:11px 12px;
    margin-bottom:6px;
    border-radius:6px;
    border:1px solid transparent;
    cursor:pointer;
    position:relative;
    transition:background .15s, border-color .15s;
  }
  .entry-card:hover{
    background:rgba(74,222,128,0.05);
    border-color:var(--line);
  }
  .entry-card.active{
    background:rgba(74,222,128,0.08);
    border-color:var(--moss-dim);
    box-shadow:inset 0 0 12px rgba(74,222,128,0.08);
  }
  .entry-card.done{ opacity:.5; }
  .entry-card.done .entry-title{ text-decoration:line-through; }
  .entry-title{
    font-size:15px; color:var(--text-main); margin:0 0 4px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .entry-meta{
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    color:var(--text-dim);
    display:flex; gap:10px; flex-wrap:wrap;
  }
  .entry-meta span{ display:inline-flex; align-items:center; gap:3px; }

  .empty-list{
    color:var(--text-faint); font-size:13px; font-style:italic;
    padding:30px 14px; text-align:center; line-height:1.6;
  }

  /* ---------- editor ---------- */
  .editor{
    display:flex; flex-direction:column;
    padding:34px 48px;
    overflow-y:auto;
    background:
      radial-gradient(ellipse 80% 40% at 50% 0%, rgba(74,222,128,0.045), transparent 60%);
  }
  .editor::-webkit-scrollbar{ width:9px; }
  .editor::-webkit-scrollbar-thumb{ background:var(--line-glow); border-radius:5px; }

  .title-input{
    background:transparent;
    border:none;
    outline:none;
    color:var(--moss-soft);
    font-family:'Cinzel', serif;
    font-weight:600;
    font-size:30px;
    letter-spacing:1px;
    text-shadow:0 0 18px rgba(74,222,128,0.25);
    width:100%;
    margin-bottom:6px;
  }
  .title-input::placeholder{ color:var(--text-faint); text-shadow:none; }

  .save-status{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--text-faint);
    margin-bottom:22px;
    letter-spacing:.5px;
    min-height:14px;
  }
  .save-status.on{ color:var(--moss); }

  .field-row{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:16px;
    margin-bottom:22px;
  }
  .field{
    display:flex; flex-direction:column; gap:6px;
  }
  .field label{
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--text-dim);
  }
  .field label .ic{ margin-right:5px; color:var(--moss); }
  .field input, .field select{
    background:var(--bg-input);
    border:1px solid var(--line);
    color:var(--text-main);
    font-family:'EB Garamond', serif;
    font-size:15px;
    padding:9px 10px;
    border-radius:6px;
    outline:none;
    transition:border-color .2s, box-shadow .2s;
  }
  .field input:focus, .field select:focus{
    border-color:var(--moss-dim);
    box-shadow:0 0 0 3px rgba(74,222,128,0.08);
  }

  .vine-divider{
    height:1px;
    margin:6px 0 26px;
    background:linear-gradient(90deg, var(--line-glow), transparent 70%);
    position:relative;
  }
  .vine-divider::before{
    content:"❧";
    position:absolute; left:-2px; top:-11px;
    color:var(--moss-dim); font-size:16px;
  }

  .notes-label{
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-bottom:8px;
  }
  .notes-area{
    flex:1;
    min-height:220px;
    background:var(--bg-input);
    border:1px solid var(--line);
    border-radius:8px;
    color:var(--text-main);
    font-family:'EB Garamond', serif;
    font-size:16px;
    line-height:1.7;
    padding:16px 18px;
    outline:none;
    resize:vertical;
    transition:border-color .2s, box-shadow .2s;
  }
  .notes-area:focus{
    border-color:var(--moss-dim);
    box-shadow:0 0 0 3px rgba(74,222,128,0.06);
  }
  .notes-area::placeholder{ color:var(--text-faint); }

  .editor-footer{
    display:flex; justify-content:space-between; align-items:center;
    margin-top:24px; padding-top:18px; border-top:1px solid var(--line);
  }
  .done-toggle{
    display:flex; align-items:center; gap:8px;
    font-family:'JetBrains Mono', monospace;
    font-size:12px; color:var(--text-dim); cursor:pointer; user-select:none;
  }
  .done-toggle input{ accent-color:var(--moss); width:15px; height:15px; cursor:pointer; }

  .delete-btn{
    background:transparent;
    border:1px solid #3a2420;
    color:var(--danger);
    font-family:'JetBrains Mono', monospace;
    font-size:11.5px;
    letter-spacing:1px;
    padding:8px 14px;
    border-radius:6px;
    cursor:pointer;
    transition:all .2s;
  }
  .delete-btn:hover{
    background:rgba(201,106,90,0.1);
    box-shadow:0 0 12px rgba(201,106,90,0.15);
  }

  /* ---------- empty state ---------- */
  .empty-state{
    margin:auto; text-align:center; color:var(--text-faint);
    max-width:340px;
  }
  .empty-state .sigil{
    font-size:38px; color:var(--moss-dim);
    text-shadow:0 0 24px rgba(74,222,128,0.35);
    margin-bottom:14px;
  }
  .empty-state h2{
    font-family:'Cinzel', serif; font-size:16px; letter-spacing:2px;
    color:var(--text-dim); font-weight:600; margin:0 0 10px;
  }
  .empty-state p{ font-size:14px; line-height:1.7; font-style:italic; margin:0; }

  @media (max-width: 760px){
    .app{ grid-template-columns:1fr; }
    .sidebar{ display:none; }
    .sidebar.show{ display:flex; position:fixed; inset:0; z-index:5; width:100%; }
    .editor{ padding:24px 20px; }
    .field-row{ grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<div class="canopy"></div>
<div id="fireflies"></div>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="glyph">🜃</div>
      <h1>UNDERGROVE</h1>
      <p>a ledger for the quiet hours</p>
    </div>
    <div class="sidebar-controls">
      <div class="search-wrap">
        <input type="text" id="search" placeholder="search the grove…" autocomplete="off">
      </div>
      <button class="new-btn" id="newEntry">✦ NEW ENTRY</button>
    </div>
    <div class="entries" id="entries"></div>
  </aside>

  <main class="editor" id="editor"></main>
</div>

<script>
(function(){
  const STORAGE_KEY = "undergrove_entries_v1";

  /* ---------- per-person storage ----------
     Entries are saved under a personal key in this browser's localStorage,
     so what one person writes here stays on their device and doesn't
     mix with anyone else's. Nothing is sent anywhere. */
  function getOwnerKey(){
    let owner = localStorage.getItem("undergrove_owner_id");
    if(!owner){
      owner = "wanderer-" + Math.random().toString(36).slice(2,8);
      localStorage.setItem("undergrove_owner_id", owner);
    }
    return STORAGE_KEY + "_" + owner;
  }
  const OWNER_KEY = getOwnerKey();

  function loadEntries(){
    try{
      const raw = localStorage.getItem(OWNER_KEY);
      return raw ? JSON.parse(raw) : [];
    }catch(e){ return []; }
  }
  function saveEntries(entries){
    localStorage.setItem(OWNER_KEY, JSON.stringify(entries));
  }

  let entries = loadEntries();
  let activeId = null;
  let filterText = "";

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

  function fmtDate(d){
    if(!d) return "";
    const dt = new Date(d + "T00:00:00");
    if(isNaN(dt)) return d;
    return dt.toLocaleDateString(undefined, { month:'short', day:'numeric' });
  }

  function groupLabel(d){
    if(!d) return "UNDATED";
    const today = new Date(); today.setHours(0,0,0,0);
    const dt = new Date(d + "T00:00:00");
    const diff = Math.round((dt - today) / 86400000);
    if(diff === 0) return "TODAY";
    if(diff === 1) return "TOMORROW";
    if(diff === -1) return "YESTERDAY";
    if(diff < 0) return "PAST";
    return dt.toLocaleDateString(undefined, { weekday:'long', month:'short', day:'numeric' }).toUpperCase();
  }

  /* ---------- fireflies ---------- */
  function spawnFireflies(){
    const host = document.getElementById("fireflies");
    const n = 22;
    for(let i=0;i<n;i++){
      const f = document.createElement("div");
      f.className = "firefly";
      const size = 2 + Math.random()*2.5;
      f.style.width = size+"px";
      f.style.height = size+"px";
      f.style.left = Math.random()*100+"vw";
      f.style.top = Math.random()*100+"vh";
      f.style.setProperty("--dx", (Math.random()*160-80)+"px");
      f.style.setProperty("--dy", (Math.random()*160-80)+"px");
      f.style.animationDuration = (14+Math.random()*16)+"s, " + (2.5+Math.random()*2)+"s";
      f.style.animationDelay = (-Math.random()*20)+"s, " + (-Math.random()*3)+"s";
      host.appendChild(f);
    }
  }

  /* ---------- render sidebar ---------- */
  function render(){
    const list = document.getElementById("entries");
    const q = filterText.trim().toLowerCase();
    let filtered = entries.filter(e=>{
      if(!q) return true;
      return (e.title+" "+e.location+" "+e.notes).toLowerCase().includes(q);
    });
    filtered.sort((a,b)=>{
      const da = a.date || "9999", db = b.date || "9999";
      if(da !== db) return da < db ? -1 : 1;
      const ta = a.time || "99:99", tb = b.time || "99:99";
      return ta < tb ? -1 : 1;
    });

    if(filtered.length === 0){
      list.innerHTML = `<div class="empty-list">${entries.length ? "no entries match your search" : "the grove is quiet.<br>plant your first entry above."}</div>`;
    } else {
      let html = "";
      let lastGroup = null;
      filtered.forEach(e=>{
        const g = groupLabel(e.date);
        if(g !== lastGroup){
          html += `<div class="day-label">${g}</div>`;
          lastGroup = g;
        }
        const metaBits = [];
        if(e.time) metaBits.push(`<span>◷ ${e.time}</span>`);
        if(e.location) metaBits.push(`<span>◎ ${escapeHtml(e.location)}</span>`);
        html += `
          <div class="entry-card ${e.id===activeId?'active':''} ${e.done?'done':''}" data-id="${e.id}">
            <p class="entry-title">${escapeHtml(e.title) || "untitled entry"}</p>
            <div class="entry-meta">${metaBits.join("")}</div>
          </div>`;
      });
      list.innerHTML = html;
    }

    list.querySelectorAll(".entry-card").forEach(card=>{
      card.addEventListener("click", ()=>{
        activeId = card.getAttribute("data-id");
        render();
        renderEditor();
      });
    });

    renderEditor();
  }

  function escapeHtml(s){
    return (s||"").replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  /* ---------- editor ---------- */
  function renderEditor(){
    const host = document.getElementById("editor");
    const entry = entries.find(e=>e.id===activeId);

    if(!entry){
      host.innerHTML = `
        <div class="empty-state">
          <div class="sigil">✦</div>
          <h2>NOTHING SELECTED</h2>
          <p>Choose an entry from the grove, or plant a new one — a task, a time, a place — and it will take root here.</p>
        </div>`;
      return;
    }

    host.innerHTML = `
      <input type="text" class="title-input" id="f-title" placeholder="untitled entry…" value="${escapeHtml(entry.title)}">
      <div class="save-status" id="saveStatus">saved to this device</div>

      <div class="field-row">
        <div class="field">
          <label><span class="ic">◐</span>DATE</label>
          <input type="date" id="f-date" value="${entry.date||''}">
        </div>
        <div class="field">
          <label><span class="ic">◷</span>TIME</label>
          <input type="time" id="f-time" value="${entry.time||''}">
        </div>
        <div class="field">
          <label><span class="ic">◎</span>LOCATION</label>
          <input type="text" id="f-location" placeholder="e.g. the old oak library" value="${escapeHtml(entry.location)}">
        </div>
      </div>

      <div class="vine-divider"></div>

      <div class="notes-label">NOTES &amp; DETAILS</div>
      <textarea class="notes-area" id="f-notes" placeholder="what needs doing, remembering, or tending to…">${escapeHtml(entry.notes)}</textarea>

      <div class="editor-footer">
        <label class="done-toggle">
          <input type="checkbox" id="f-done" ${entry.done?'checked':''}>
          mark as complete
        </label>
        <button class="delete-btn" id="deleteBtn">✕ REMOVE ENTRY</button>
      </div>
    `;

    const fields = ["title","date","time","location","notes"];
    fields.forEach(f=>{
      document.getElementById("f-"+f).addEventListener("input", debounce(()=>{
        entry[f] = document.getElementById("f-"+f).value;
        persist();
        refreshSidebarOnly();
      }, 250));
    });

    document.getElementById("f-done").addEventListener("change", (e)=>{
      entry.done = e.target.checked;
      persist();
      render();
    });

    document.getElementById("deleteBtn").addEventListener("click", ()=>{
      if(confirm("Remove this entry from the grove? This cannot be undone.")){
        entries = entries.filter(e2=>e2.id!==entry.id);
        activeId = null;
        persist();
        render();
      }
    });
  }

  function refreshSidebarOnly(){
    const list = document.getElementById("entries");
    // lightweight: just re-render list, keep focus in editor
    const q = filterText;
    const savedFocus = document.activeElement && document.activeElement.id;
    render.call(null);
    if(savedFocus){
      const el = document.getElementById(savedFocus);
      if(el){ el.focus(); const v=el.value; el.value=""; el.value=v; }
    }
  }

  function debounce(fn, ms){
    let t;
    return (...args)=>{ clearTimeout(t); t = setTimeout(()=>fn(...args), ms); };
  }

  function persist(){
    saveEntries(entries);
    const status = document.getElementById("saveStatus");
    if(status){
      status.textContent = "✓ saved to this device";
      status.classList.add("on");
      clearTimeout(persist._t);
      persist._t = setTimeout(()=>{
        if(status){ status.textContent = "saved to this device"; status.classList.remove("on"); }
      }, 1400);
    }
  }

  /* ---------- controls ---------- */
  document.getElementById("newEntry").addEventListener("click", ()=>{
    const today = new Date();
    const iso = today.toISOString().slice(0,10);
    const e = { id:uid(), title:"", date:iso, time:"", location:"", notes:"", done:false };
    entries.unshift(e);
    activeId = e.id;
    persist();
    render();
    setTimeout(()=>{ const t=document.getElementById("f-title"); if(t) t.focus(); }, 30);
  });

  document.getElementById("search").addEventListener("input", (e)=>{
    filterText = e.target.value;
    render();
  });

  spawnFireflies();
  render();
})();
</script>
</body>
</html>
